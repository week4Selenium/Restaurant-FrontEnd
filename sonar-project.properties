sonar.projectKey=week4Selenium_Restaurant-FrontEnd
sonar.organization=week4selenium
sonar.host.url=https://sonarcloud.io

sonar.projectName=Restaurant-FrontEnd
sonar.projectVersion=0.1.0

# ── Source configuration ──────────────────────────────────
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx
sonar.exclusions=\
  src/test/**,\
  src/assets/**,\
  src/vite-env.d.ts,\
  **/*.d.ts,\
  src/main.tsx

# ── Coverage ──────────────────────────────────────────────
# Vitest generates lcov report at this path
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── TypeScript ────────────────────────────────────────────
sonar.typescript.tsconfigPaths=tsconfig.app.json

# ── Encoding ──────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

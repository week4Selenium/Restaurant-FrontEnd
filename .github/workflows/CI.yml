# ================================================================
# CI Pipeline — Sistemas-de-pedidos-restaurante-frontend
# ================================================================
# Quality gates: TypeScript · ESLint · Vitest (70 % cov) · SonarCloud · Build
# Target duration: < 5 min
# ================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# ── Concurrency ────────────────────────────────────────────────
# Cancel in-flight runs for the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Permissions ────────────────────────────────────────────────
permissions:
  contents: read
  packages: write            # Needed for GHCR image publishing
  pull-requests: read        # Needed for SonarCloud PR decoration

# ===============================================================
# JOBS
# ===============================================================

jobs:

  # ─────────────────────────────────────────────────────────────
  # 1. Install + cache dependencies (shared by all downstream jobs)
  # ─────────────────────────────────────────────────────────────
  install:
    name: 📦 Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # Cache node_modules so downstream jobs skip npm ci
      - uses: actions/cache/save@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  # ─────────────────────────────────────────────────────────────
  # 2a. Lint (parallel with typecheck)
  # ─────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: ESLint
        run: npm run lint

  # ─────────────────────────────────────────────────────────────
  # 2b. TypeScript type-check (parallel with lint)
  # ─────────────────────────────────────────────────────────────
  typecheck:
    name: 🔠 TypeCheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: TypeScript compile check
        run: npx --no-install tsc -b

  # ─────────────────────────────────────────────────────────────
  # 3. Tests + Coverage
  # ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Test
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    env:
      VITE_USE_MOCK: "true"          # No backend needed in CI
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run Vitest with coverage
        run: npm run test:coverage

      # Persist coverage for SonarCloud and artifact upload
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4  # v4 is latest stable
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 4. SonarCloud analysis (MANDATORY)
  # ─────────────────────────────────────────────────────────────
  # Quality Gate enforced: 80% coverage on new code, A rating
  sonarcloud:
    name: ☁️ SonarCloud
    needs: test
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 is REQUIRED — Sonar needs full history for
      # new-code detection and blame information.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Download the coverage report generated by the test job
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # 5. Production build
  # ─────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    needs: sonarcloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4  # v4 is latest stable
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 6. Docker publish to GHCR (only on push to main / develop)
  # ─────────────────────────────────────────────────────────────
  docker-publish:
    name: 🐳 Docker Publish
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
